<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=delete,download"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Teko:wght@400;500;600;700&family=Anton&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./styles.css" />
        <title>FIFA World Cup 2026 - Knockout Bracket</title>
    </head>
    <body>
        <header>
            <div class="header-left">
                <img
                    src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill&quality=75"
                    alt="FIFA World Cup 2026 Logo"
                    width="32"
                    class="display_logo"
                />
                <img
                    src="https://digitalhub.fifa.com/transform/72a8ea8e-9019-49a4-8e79-8b2488cd9972/WC26_logo_brand_identity_black-bg?io=transform:fill&quality=100"
                    alt="FIFA World Cup 2026 Dark Logo"
                    width="60"
                    class="print_logo"
                />
                <div class="header-title">
                    <h1>FIFA World Cup 2026</h1>
                </div>
            </div>
            <div class="header-right">
                <div class="header-meta">
                    <strong
                        >Knockout Stage Bracket &bull; June 28 &ndash; July 19
                    </strong>
                    Click or tap any team to advance them to the next round.
                    Kickoff times are shown in local time
                </div>
                <div class="legend">
                    <button class="btn btn-secondary" onclick="window.print()">
                        <span class="material-symbols-outlined">
                            download
                        </span>
                    </button>
                    <button class="btn btn-danger" onclick="clearAll()">
                        <span class="material-symbols-outlined"> delete </span>
                    </button>
                </div>
            </div>
        </header>
        <main>
            <div class="round-labels">
                <div class="round-label">Round of 32</div>
                <div class="round-label">Round of 16</div>
                <div class="round-label">Quarterfinals</div>
                <div class="round-label">Semifinals</div>
                <div class="round-label" style="text-align: center">Final</div>
                <div class="round-label">Semifinals</div>
                <div class="round-label">Quarterfinals</div>
                <div class="round-label">Round of 16</div>
                <div class="round-label">Round of 32</div>
            </div>
            <div class="main-container">
                <svg id="connector-layer" aria-hidden="true"></svg>

                <div class="bracket-wrapper">
                    <div class="col" id="col-r32-l"></div>
                    <div class="col" id="col-r16-l"></div>
                    <div class="col" id="col-qf-l"></div>
                    <div class="col" id="col-sf-l"></div>

                    <!-- CENTER -->
                    <div class="center-col">
                        <div class="final-container">
                            <div class="trophy-center">
                                <img
                                    src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill&quality=75"
                                    alt="FIFA World Cup 2026 Logo"
                                    class="display_logo"
                                    height="128"
                                />
                                <img
                                    src="https://digitalhub.fifa.com/transform/72a8ea8e-9019-49a4-8e79-8b2488cd9972/WC26_logo_brand_identity_black-bg?io=transform:fill&quality=100"
                                    alt="FIFA World Cup 2026 Dark Logo"
                                    class="print_logo"
                                    height="128"
                                />
                                <h2>WORLD CUP FINAL</h2>
                            </div>
                            <div class="match final-match" id="match-FINAL">
                                <div
                                    class="match-meta"
                                    style="background: #1a1408"
                                >
                                    <span
                                        class="match-num"
                                        id="final-time"
                                    ></span>
                                </div>
                                <div
                                    class="team-row"
                                    id="row-FINAL-1"
                                    data-match="FINAL"
                                    data-slot="1"
                                >
                                    <input
                                        class="team-input"
                                        id="t-FINAL-1"
                                        placeholder="—"
                                        readonly
                                    />
                                </div>
                                <div
                                    class="team-row"
                                    id="row-FINAL-2"
                                    data-match="FINAL"
                                    data-slot="2"
                                >
                                    <input
                                        class="team-input"
                                        id="t-FINAL-2"
                                        placeholder="—"
                                        readonly
                                    />
                                </div>
                            </div>
                        </div>
                        <div class="third-container">
                            <h3>Third place match</h3>
                            <div class="match third-match" id="match-3RD">
                                <div
                                    class="match-meta"
                                    style="background: #1a1408"
                                >
                                    <span
                                        class="match-num"
                                        id="3RD-time"
                                    ></span>
                                </div>
                                <div
                                    class="team-row"
                                    id="row-3RD-1"
                                    data-match="3RD"
                                    data-slot="1"
                                >
                                    <input
                                        class="team-input"
                                        id="t-3RD-1"
                                        placeholder="—"
                                        readonly
                                    />
                                </div>
                                <div
                                    class="team-row"
                                    id="row-3RD-2"
                                    data-match="3RD"
                                    data-slot="2"
                                >
                                    <input
                                        class="team-input"
                                        id="t-3RD-2"
                                        placeholder="—"
                                        readonly
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col" id="col-sf-r"></div>
                    <div class="col" id="col-qf-r"></div>
                    <div class="col" id="col-r16-r"></div>
                    <div class="col" id="col-r32-r"></div>
                </div>
            </div>
        </main>
        <script src="./main.js"></script>
    </body>
</html>
